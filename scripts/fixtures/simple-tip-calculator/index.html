<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tip calculator fixture</title>
  </head>
  <body>
    <main>
      <label>Bill <input id="bill-input" inputmode="decimal" value="0" /></label>
      <button type="button" data-tip="20">20% tip</button>
      <label>Party size <input id="party-size-input" inputmode="numeric" value="1" /></label>
      <p>Tip per person: <output id="tip-per-person">$0.00</output></p>
      <p>Total per person: <output id="total-per-person">$0.00</output></p>
    </main>
    <script src="app.js"></script>
  </body>
</html>
